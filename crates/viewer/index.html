<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Simulate Everything — Viewer</title>
  <link data-trunk rel="rust" data-wasm-opt="2"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #viewer-root {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #solid-ui {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    #solid-ui > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="viewer-root">
    <div id="solid-ui"></div>
  </div>
</body>
</html>
